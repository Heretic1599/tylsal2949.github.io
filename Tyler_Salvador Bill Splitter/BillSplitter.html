<!DOCTYPE html>
<!--
Name: Tyler Salvador
Date: July 21, 2026

This program calculates a restaurant tip, the total bill,
and evenly splits the bill between a specified number of people.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Splitter</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>tylsal2949 — Bill Splitter</h1>

<form id="billForm" novalidate>

    <label for="billAmount">Bill Amount</label>
    <input
        type="number"
        id="billAmount"
        placeholder="e.g., 84.50"
        min="0"
        step="0.01">

    <small id="billError" class="error"></small>

    <label for="tipPercent">Tip Percentage</label>

    <input
        type="number"
        id="tipPercent"
        min="0"
        max="100"
        placeholder="0-100">

    <small>
        Enter a number from 0 to 100.
    </small>

    <small id="tipError" class="error"></small>

    <label for="peopleCount">People Count</label>

    <input
        type="number"
        id="peopleCount"
        placeholder="e.g., 3"
        min="1">

    <small id="peopleError" class="error"></small>

    <br><br>

    <button type="button" id="calculateBtn">
        Calculate
    </button>

</form>

<div id="results"></div>

<script src="Calculation.js"></script>

</body>
</html>
