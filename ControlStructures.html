<!DOCTYPE html>
<html>
<head>

Purpose: Calculate lunch order totals using control structures.
-->

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Unit 2 Guided Practice 1</title>

</head>

<body>
<header>
<h1>
YOUR_STUDENT_ID, Control Structures
</h1>
</header>

<article>
<h2>Lunch selections</h2>

<form>
<input type="checkbox" id="item1" value="8" />
<label for="item1">Fried chicken ($8.00)</label><br>

<input type="checkbox" id="item2" value="10" />
<label for="item2">Fried halibut ($10.00)</label><br>

<input type="checkbox" id="item3" value="8" />
<label for="item3">Hamburger ($8.00)</label><br>

<input type="checkbox" id="item4" value="13" />
<label for="item4">Grilled salmon ($13.00)</label><br>

<input type="checkbox" id="item5" value="6" />
<label for="item5">Side salad ($6.00)</label><br><br>

<input type="button" value="Submit" id="sButton" />
</form>

<div>
<p id="total"></p>
</div>

</article>

<script>
// Function to sum selected items and display total
function calcTotal() {
    var itemTotal = 0;
    var items = document.getElementsByTagName("input");

    for (var i = 0; i < 5; i++) {
        if (items[i].checked) {
            itemTotal += (items[i].value * 1);
        }
    }

    document.getElementById("total").innerHTML =
        "Your order total is $" + itemTotal + ".00";
}

// Add event listener to Submit button
var submitButton = document.getElementById("sButton");

if (submitButton.addEventListener) {
    submitButton.addEventListener("click", calcTotal, false);
}
else if (submitButton.attachEvent) {
    submitButton.attachEvent("onclick", calcTotal);
}
</script>

</body>
</html>
